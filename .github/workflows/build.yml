name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Show repository structure
      shell: pwsh
      run: |
        Write-Host "=== Current directory ==="
        Get-Location
        Write-Host "=== Files in root ==="
        Get-ChildItem | Format-Table Name, Length
    
    - name: Install dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.11 psutil requests Pillow pyinstaller
        Write-Host "Dependencies installed"
        pip list
    
    - name: Verify main script exists
      shell: pwsh
      run: |
        if (Test-Path "smart_ram_cleaner.py") {
          Write-Host "smart_ram_cleaner.py found"
        } else {
          Write-Error "smart_ram_cleaner.py not found"
          exit 1
        }
    
    - name: Create chrome_extension if missing
      shell: pwsh
      run: |
        if (-not (Test-Path "chrome_extension")) {
          New-Item -ItemType Directory -Path "chrome_extension" -Force | Out-Null
          $manifest = @{
            manifest_version = 3
            name = "Smart Tab Suspender"
            version = "1.0"
            description = "Tab suspender"
            permissions = @("tabs", "storage")
            background = @{ service_worker = "background.js" }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path "chrome_extension/manifest.json" -Value $manifest
          Set-Content -Path "chrome_extension/background.js" -Value "console.log('loaded');"
          Write-Host "chrome_extension created"
        } else {
          Write-Host "chrome_extension already exists"
        }
    
    - name: Create icon if missing
      shell: pwsh
      run: |
        if (-not (Test-Path "assets/icon.ico")) {
          New-Item -ItemType Directory -Path "assets" -Force | Out-Null
          python -c "from PIL import Image; img = Image.new('RGB', (256, 256), color=(0, 122, 204)); img.save('assets/icon.ico', format='ICO')"
          Write-Host "Icon created"
        }
    
    - name: Build EXE with PyInstaller
      shell: pwsh
      run: |
        Write-Host "Starting build..."
        pyinstaller --noconfirm --onefile --windowed --name SmartRAMCleaner --uac-admin --icon "assets/icon.ico" --add-data "chrome_extension;chrome_extension" smart_ram_cleaner.py
        Write-Host "Build completed"
        Get-ChildItem dist -ErrorAction SilentlyContinue
    
    - name: Verify EXE exists
      shell: pwsh
      run: |
        if (Test-Path "dist/SmartRAMCleaner.exe") {
          $file = Get-Item "dist/SmartRAMCleaner.exe"
          $sizeMB = [math]::Round($file.Length / 1MB, 2)
          Write-Host "EXE created successfully"
          Write-Host "Size: $sizeMB MB"
        } else {
          Write-Error "SmartRAMCleaner.exe not found in dist/"
          exit 1
        }
    
    - name: Upload EXE to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/SmartRAMCleaner.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact as backup
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: SmartRAMCleaner-EXE
        path: dist/SmartRAMCleaner.exe
        retention-days: 30
